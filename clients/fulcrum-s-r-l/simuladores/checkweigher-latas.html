<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checkweigher – Latas de Pintura 20 L</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1e; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .hdr { background: #050c1a; border-bottom: 2px solid #001F77; padding: 10px 24px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
  .hdr-title { color: #fff; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .hdr-sub { color: rgba(255,255,255,0.45); font-size: 0.68rem; font-style: italic; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .spacer { flex: 1; }
  .stat-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 14px; text-align: center; }
  .stat-box .val { color: #fff; font-size: 1rem; font-weight: 800; }
  .stat-box .lbl { color: rgba(255,255,255,0.4); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-ok .val { color: #00ff88; }
  .stat-rej .val { color: #ff4d4d; }

  /* ── Canvas area ── */
  .scene { flex: 1; position: relative; overflow: hidden; }
  svg.main { width: 100%; height: 100%; }

  /* ── Weight display ── */
  .weight-panel { position: absolute; left: 50%; transform: translateX(-50%); top: 18px; background: #050c1a; border: 2px solid #0036A7; border-radius: 12px; padding: 10px 22px; text-align: center; min-width: 160px; }
  .weight-val { color: #00e5ff; font-size: 2rem; font-weight: 900; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
  .weight-unit { color: rgba(255,255,255,0.5); font-size: 0.7rem; }
  .weight-status { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; margin-top: 4px; }
  .status-ok  { color: #00ff88; }
  .status-rej { color: #ff4d4d; }
  .status-wait { color: rgba(255,255,255,0.3); }

  /* ── Bottom bar ── */
  .bottom { background: #050c1a; border-top: 1px solid rgba(255,255,255,0.08); padding: 8px 24px; display: flex; gap: 24px; align-items: center; flex-shrink: 0; }
  .param { color: rgba(255,255,255,0.4); font-size: 0.65rem; }
  .param span { color: rgba(255,255,255,0.75); font-weight: 700; }
</style>
</head>
<body>

<div class="hdr">
  <div class="dot"></div>
  <div>
    <div class="hdr-title">Checkweigher – Latas de Pintura 20 L</div>
    <div class="hdr-sub">Infeed · Checkweigher · Outfeed</div>
  </div>
  <div class="spacer"></div>
  <div class="stat-box stat-ok">
    <div class="val" id="cntOk">0</div>
    <div class="lbl">OK</div>
  </div>
  <div class="stat-box stat-rej">
    <div class="val" id="cntRej">0</div>
    <div class="lbl">Rechazo</div>
  </div>
  <div class="stat-box">
    <div class="val" id="cntTotal">0</div>
    <div class="lbl">Total</div>
  </div>
</div>

<div class="scene">
  <svg class="main" id="svg" viewBox="0 0 1200 440" preserveAspectRatio="xMidYMid meet"></svg>

  <div class="weight-panel">
    <div class="weight-val" id="wVal">——</div>
    <div class="weight-unit">kg</div>
    <div class="weight-status status-wait" id="wStatus">EN ESPERA</div>
  </div>
</div>

<div class="bottom">
  <div class="param">Nominal: <span>25.400 kg</span></div>
  <div class="param">Tolerancia: <span>± 200 g</span></div>
  <div class="param">Límite inferior: <span>25.200 kg</span></div>
  <div class="param">Límite superior: <span>25.600 kg</span></div>
  <div class="param">Capacidad: <span>20 latas/min</span></div>
</div>

<script>
const NOMINAL = 25.4;
const TOL     = 0.2;
const LO      = NOMINAL - TOL;
const HI      = NOMINAL + TOL;

// SVG helpers
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  if (parent) parent.appendChild(e);
  return e;
}

const svg = document.getElementById('svg');
const VW = 1200, VH = 440;
const BELT_Y   = 280;   // top of belt surface
const BELT_H   = 28;
const CAN_W    = 52;
const CAN_H    = 72;
const CAN_Y    = BELT_Y - CAN_H;

// ── Zones (x ranges) ──────────────────────────────────
const INFEED_X1 = 30,  INFEED_X2 = 380;
const CW_X1     = 440, CW_X2     = 760;
const OUT_X1    = 820, OUT_X2    = 1170;
const REJ_START_X = CW_X2 + 20;

// ── Draw static scene ─────────────────────────────────
function buildScene() {
  const defs = el('defs', {}, svg);

  // Belt gradient
  const bg = el('linearGradient', { id:'beltGrad', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  [['0%','#1a2a4a'],['40%','#0d1a33'],['100%','#060f22']].forEach(([o,c])=>{ const s=el('stop',{offset:o},bg); s.style.stopColor=c; });

  // Can gradient
  const cg = el('linearGradient', { id:'canGrad', x1:'0', y1:'0', x2:'1', y2:'0' }, defs);
  [['0%','#c0392b'],['30%','#e74c3c'],['70%','#e74c3c'],['100%','#962d22']].forEach(([o,c])=>{ const s=el('stop',{offset:o},cg); s.style.stopColor=c; });

  // CW platform gradient
  const cw = el('linearGradient', { id:'cwGrad', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  [['0%','#1e3a6e'],['100%','#0f1f3d']].forEach(([o,c])=>{ const s=el('stop',{offset:o},cw); s.style.stopColor=c; });

  // Reject gradient
  const rg = el('linearGradient', { id:'rejGrad', x1:'0', y1:'0', x2:'0', y2:'1' }, defs);
  [['0%','#4a1a1a'],['100%','#220a0a']].forEach(([o,c])=>{ const s=el('stop',{offset:o},rg); s.style.stopColor=c; });

  // ── Infeed belt ──
  drawBelt(INFEED_X1, INFEED_X2, 'Infeed Conveyor', '#00aaff');

  // ── CW platform ──
  el('rect',{ x:CW_X1-10, y:BELT_Y-6, width:CW_X2-CW_X1+20, height:BELT_H+12, rx:4, fill:'url(#cwGrad)', stroke:'#0055cc', 'stroke-width':2 }, svg);
  el('rect',{ x:CW_X1, y:BELT_Y, width:CW_X2-CW_X1, height:BELT_H, rx:2, fill:'url(#beltGrad)', stroke:'#0044aa', 'stroke-width':1 }, svg);
  drawBeltStripes(CW_X1, CW_X2, '#0044aa');
  // legs
  [[CW_X1+20, BELT_Y+BELT_H],[CW_X2-20, BELT_Y+BELT_H]].forEach(([x,y])=>{
    el('rect',{ x:x-8, y:y, width:16, height:60, rx:4, fill:'#0d1a33', stroke:'#0036A7','stroke-width':1 }, svg);
  });
  // label
  const cwLbl = el('text',{ x:(CW_X1+CW_X2)/2, y:BELT_Y+BELT_H+85, 'text-anchor':'middle', fill:'#4488ff', 'font-size':13, 'font-weight':700, 'letter-spacing':2, 'font-family':'Segoe UI,Arial' }, svg);
  cwLbl.textContent = 'CHECKWEIGHER';
  // tare line
  el('line',{ x1:CW_X1, y1:BELT_Y-1, x2:CW_X2, y2:BELT_Y-1, stroke:'#0066ff', 'stroke-width':1.5, 'stroke-dasharray':'6 4', opacity:.6 }, svg);

  // ── Outfeed belt ──
  drawBelt(OUT_X1, OUT_X2, 'Outfeed Conveyor', '#00ff88');

  // ── Reject chute ──
  // slanted surface going down-right from end of CW
  const rejY1 = BELT_Y + BELT_H;
  const rejY2 = VH - 60;
  const rejX1 = REJ_START_X;
  const rejX2 = rejX1 + 120;
  el('polygon',{ points:`${rejX1},${rejY1} ${rejX1+60},${rejY1} ${rejX2},${rejY2} ${rejX1-20},${rejY2}`, fill:'url(#rejGrad)', stroke:'#661111','stroke-width':1.5, opacity:.85 }, svg);
  const rejLbl = el('text',{ x:rejX1+30, y:rejY2-10, 'text-anchor':'middle', fill:'#ff4d4d', 'font-size':11, 'font-weight':700, 'letter-spacing':2, 'font-family':'Segoe UI,Arial' }, svg);
  rejLbl.textContent = 'RECHAZO';

  // ── Reject bin ──
  el('rect',{ x:rejX1-30, y:rejY2, width:160, height:VH-rejY2-10, rx:6, fill:'#1a0505', stroke:'#661111','stroke-width':1.5 }, svg);

  // ── Gap labels ──
  const gapStyle = { fill:'rgba(255,255,255,0.2)', 'font-size':11, 'text-anchor':'middle', 'font-family':'Segoe UI,Arial', 'font-style':'italic' };
  const g1 = el('text',{ x:(INFEED_X2+CW_X1)/2, y:BELT_Y+BELT_H+20, ...gapStyle }, svg); g1.textContent='▶';
  const g2 = el('text',{ x:(CW_X2+OUT_X1)/2,    y:BELT_Y+BELT_H+20, ...gapStyle }, svg); g2.textContent='▶';
}

function drawBelt(x1, x2, label, color) {
  el('rect',{ x:x1, y:BELT_Y, width:x2-x1, height:BELT_H, rx:3, fill:'url(#beltGrad)', stroke:color, 'stroke-width':1.5, opacity:.9 }, svg);
  drawBeltStripes(x1, x2, color);
  // rollers
  [x1+16, x2-16].forEach(cx => {
    el('ellipse',{ cx, cy:BELT_Y+BELT_H/2, rx:14, ry:BELT_H/2+4, fill:'#0d1a33', stroke:color,'stroke-width':2 }, svg);
    el('ellipse',{ cx, cy:BELT_Y+BELT_H/2, rx:6, ry:BELT_H/2-2, fill:'#1a2a4a' }, svg);
  });
  // support legs
  const mid = (x1+x2)/2;
  [mid-80, mid+80].forEach(lx => {
    el('rect',{ x:lx-6, y:BELT_Y+BELT_H, width:12, height:60, rx:3, fill:'#0d1a33', stroke:'rgba(255,255,255,0.1)','stroke-width':1 }, svg);
  });
  // label
  const lbl = el('text',{ x:(x1+x2)/2, y:BELT_Y+BELT_H+85, 'text-anchor':'middle', fill:color, 'font-size':12, 'font-weight':600, 'letter-spacing':2, 'font-family':'Segoe UI,Arial', opacity:.8 }, svg);
  lbl.textContent = label.toUpperCase();
}

function drawBeltStripes(x1, x2, color) {
  for (let x=x1+30; x<x2-10; x+=28) {
    el('line',{ x1:x, y1:BELT_Y+4, x2:x+10, y2:BELT_Y+BELT_H-4, stroke:color, 'stroke-width':1, opacity:.25 }, svg);
  }
}

// ── Can factory ──────────────────────────────────────
let canId = 0;
const activeCans = [];
let cntOk = 0, cntRej = 0;

function spawnCan() {
  const id = canId++;
  const weight = NOMINAL + (Math.random()*0.7 - 0.35); // ±350g range, ~15% reject rate
  const isOk = weight >= LO && weight <= HI;
  const g = el('g',{ id:`can-${id}` }, svg);

  // Body
  const body = el('rect',{ x:-CAN_W/2, y:-CAN_H, width:CAN_W, height:CAN_H, rx:4, fill:'url(#canGrad)', stroke:'#7b241c','stroke-width':1.5 }, g);
  // Lid
  el('ellipse',{ cx:0, cy:-CAN_H, rx:CAN_W/2, ry:6, fill:'#aaa', stroke:'#888','stroke-width':1 }, g);
  // Bottom
  el('ellipse',{ cx:0, cy:0, rx:CAN_W/2, ry:6, fill:'#7b241c' }, g);
  // Handle
  el('path',{ d:`M -${CAN_W*0.25} -${CAN_H*0.85} q 0 -18 ${CAN_W*0.5} 0`, fill:'none', stroke:'#bbb','stroke-width':3,'stroke-linecap':'round' }, g);
  // Label
  const lbl = el('rect',{ x:-CAN_W*0.38, y:-CAN_H*0.7, width:CAN_W*0.76, height:CAN_H*0.4, rx:2, fill:'rgba(255,255,255,0.12)' }, g);
  const lt = el('text',{ x:0, y:-CAN_H*0.52, 'text-anchor':'middle', fill:'#fff', 'font-size':8, 'font-weight':700, 'font-family':'Segoe UI,Arial' }, g); lt.textContent='PINTURA';
  const lt2 = el('text',{ x:0, y:-CAN_H*0.38, 'text-anchor':'middle', fill:'rgba(255,255,255,0.7)', 'font-size':7, 'font-family':'Segoe UI,Arial' }, g); lt2.textContent='20 L';

  const startX = INFEED_X1 + 30;
  g.setAttribute('transform', `translate(${startX + CAN_W/2}, ${CAN_Y + CAN_H})`);

  activeCans.push({ id, g, weight, isOk, x: startX + CAN_W/2, phase: 'infeed', timer: 0, weighing: false, done: false, rejected: false, rejY: BELT_Y + BELT_H });
}

// ── Animation loop ───────────────────────────────────
const INFEED_SPEED  = 1.8;
const CW_SPEED      = 1.2;
const OUT_SPEED     = 2.2;
const REJ_SPEED     = 1.5;

let lastSpawn = 0;
const SPAWN_INTERVAL = 110; // frames between cans
let frame = 0;
let weighTimer = 0;
let currentWeighCan = null;

const wVal    = document.getElementById('wVal');
const wStatus = document.getElementById('wStatus');
const cntOkEl = document.getElementById('cntOk');
const cntRejEl= document.getElementById('cntRej');
const cntTotEl= document.getElementById('cntTotal');

function setWeight(w, status) {
  if (w === null) { wVal.textContent = '——'; wStatus.className='weight-status status-wait'; wStatus.textContent='EN ESPERA'; return; }
  wVal.textContent = w.toFixed(3);
  if (status === 'ok')  { wStatus.className='weight-status status-ok';  wStatus.textContent='✔  CONFORME'; }
  if (status === 'rej') { wStatus.className='weight-status status-rej'; wStatus.textContent='✘  RECHAZO';  }
  if (status === 'w')   { wStatus.className='weight-status status-wait'; wStatus.textContent='PESANDO...'; }
}

function animate() {
  requestAnimationFrame(animate);
  frame++;

  // Spawn
  if (frame - lastSpawn >= SPAWN_INTERVAL) {
    spawnCan();
    lastSpawn = frame;
  }

  // Move cans
  for (let i = activeCans.length - 1; i >= 0; i--) {
    const c = activeCans[i];
    if (c.done) continue;

    if (c.phase === 'infeed') {
      const target = CW_X1 - CAN_W/2 - 10;
      if (c.x < target) {
        c.x += INFEED_SPEED;
      } else {
        // wait if CW is busy
        if (!currentWeighCan) {
          c.phase = 'cw_enter';
          currentWeighCan = c;
          weighTimer = 0;
          setWeight(null, null);
        }
      }
    }

    else if (c.phase === 'cw_enter') {
      const cwCenter = (CW_X1 + CW_X2) / 2;
      if (c.x < cwCenter) {
        c.x += CW_SPEED;
      } else {
        c.phase = 'cw_weigh';
        weighTimer = 0;
        setWeight(c.weight, 'w');
      }
    }

    else if (c.phase === 'cw_weigh') {
      weighTimer++;
      // Simulated weight fluctuation while weighing
      if (weighTimer < 40) {
        const noise = (Math.random()-0.5)*2;
        setWeight(c.weight + noise, 'w');
      } else if (weighTimer === 40) {
        setWeight(c.weight, c.isOk ? 'ok' : 'rej');
        if (c.isOk) { cntOk++; cntOkEl.textContent=cntOk; }
        else        { cntRej++; cntRejEl.textContent=cntRej; }
        cntTotEl.textContent = cntOk + cntRej;
      } else if (weighTimer > 55) {
        c.phase = c.isOk ? 'outfeed' : 'reject';
        currentWeighCan = null;
      }
    }

    else if (c.phase === 'outfeed') {
      if (c.x < OUT_X2 + 20) {
        c.x += OUT_SPEED;
      } else {
        c.done = true;
        svg.removeChild(c.g);
      }
    }

    else if (c.phase === 'reject') {
      // Move right toward chute, then fall
      if (c.x < REJ_START_X + 30) {
        c.x += REJ_SPEED;
      } else {
        // fall down the chute
        c.rejY += REJ_SPEED * 2.5;
        if (c.rejY > VH + 20) {
          c.done = true;
          svg.removeChild(c.g);
        }
      }
    }

    if (!c.done) {
      const y = c.phase === 'reject' ? c.rejY : CAN_Y + CAN_H;
      c.g.setAttribute('transform', `translate(${c.x}, ${y})`);

      // Tint rejected can red while on CW
      if (weighTimer > 40 && c.phase === 'cw_weigh' && !c.isOk) {
        c.g.style.filter = 'brightness(0.6) sepia(1) saturate(3) hue-rotate(0deg)';
      } else if (c.phase !== 'cw_weigh') {
        c.g.style.filter = '';
      }
    }
  }

  // Remove done cans from array
  for (let i = activeCans.length - 1; i >= 0; i--) {
    if (activeCans[i].done) activeCans.splice(i, 1);
  }

  // Belt stripe animation (redraw stripes shifted)
  // handled by opacity only — static is fine for now
}

buildScene();
animate();
</script>
</body>
</html>
